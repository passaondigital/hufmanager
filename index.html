<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <title>Hufi — Dein digitaler Hufbearbeiter</title>
    <meta name="description" content="Hufi ist die All-in-One-App für mobile Pferdeprofis. Kunden, Pferde, Termine, Navigation und KI-Assistenz — alles in einer App." />
    <meta name="author" content="Pascal Schmid / Barhufserviceschmid" />

    <!-- Favicon & Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icon-16.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="/icon-96.png" />

    <!-- iOS / Apple PWA -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Hufi" />

    <!-- Theme Color (Browser Bar & PWA) -->
    <meta name="theme-color" content="#0a0700" />
    <meta name="msapplication-TileColor" content="#0a0700" />
    <meta name="msapplication-TileImage" content="/icon-192.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="Hufi — App für mobile Pferdeprofis" />
    <meta property="og:description" content="Kunden, Pferde, Termine, Navigation und KI — alles in einer App. Kostenlose Kunden-App inklusive." />

    <meta property="og:image" content="/og-image.png" />
    <meta property="og:url" content="https://hufiapp.de" />

    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:description" content="Kunden, Pferde, Termine, Navigation und KI — alles in einer App." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
