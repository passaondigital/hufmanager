<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <title>Hufi - Dein digitaler Hufbearbeiter</title>
    <meta name="description" content="Hufi ist die All-in-One-Lösung für professionelle Hufbearbeiter. Verwalten Sie Kunden, Pferde, Termine und mehr." />
    <meta name="author" content="Hufi" />
    
    <!-- Favicon & Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icon-16.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="/icon-96.png" />
    
    <!-- iOS / Apple PWA -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Hufi" />

    <!-- Theme Color (Browser Bar & PWA) -->
    <meta name="theme-color" content="#F97316" />
    <meta name="msapplication-TileColor" content="#F97316" />
    <meta name="msapplication-TileImage" content="/icon-192.png" />
    
    <!-- Open Graph -->
    <meta property="og:title" content="Hufi - Professionelle Hufpflege-Verwaltung" />
    <meta property="og:description" content="Die cloudbasierte SaaS-Plattform für Hufbearbeiter zur Verwaltung von Kunden, Pferden und Terminen." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:url" content="https://hufiapp.de" />
    <meta property="og:site_name" content="Hufi" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@HufiApp" />
    <meta name="twitter:image" content="/og-image.png" />
    <meta name="twitter:title" content="Hufi - Professionelle Hufpflege-Verwaltung" />
    <meta name="twitter:description" content="Die cloudbasierte SaaS-Plattform für Hufbearbeiter." />

    <!-- Domain redirect: v25.assaon.com → hufiapp.de -->
    <script>
      if (window.location.hostname === 'v25.assaon.com') {
        window.location.replace(
          'https://hufiapp.de' + window.location.pathname + window.location.search
        );
      }
    </script>

    <!-- DNS Prefetch & Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://vnschgjxkzzwzefqlrji.supabase.co" />
    <link rel="preconnect" href="https://vnschgjxkzzwzefqlrji.supabase.co" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fira+Sans:wght@400;600;700&family=Instrument+Serif:ital@0;1&family=Lora:wght@400;600;700&family=Merriweather:wght@400;700&family=Open+Sans:wght@400;600;700&family=Playfair+Display:wght@400;600;700&family=Roboto:wght@400;500;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
