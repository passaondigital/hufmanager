<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0, user-scalable=yes" />
    <title>HufManager — Software für Hufbearbeiter</title>
    <meta name="description" content="HufManager ist die Branchensoftware für Hufbearbeiter. Kunden, Pferde, Termine, Rechnungen und Touren — alles in einer App." />
    <meta name="author" content="Pascal Schmid / Barhufserviceschmid" />

    <!-- Favicon & Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icon-16.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="/icon-96.png" />

    <!-- iOS / Apple PWA -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HufManager" />

    <!-- Theme Color (Browser Bar & PWA) -->
    <meta name="theme-color" content="#0a0700" />
    <meta name="msapplication-TileColor" content="#0a0700" />
    <meta name="msapplication-TileImage" content="/icon-192.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="HufManager — Software für Hufbearbeiter" />
    <meta property="og:description" content="Kunden, Pferde, Termine, Rechnungen und Touren — alles in einer App. Ab 9,90 € / Monat." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:url" content="https://app.hufmanager.de" />
    <meta property="og:site_name" content="HufManager" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/og-image.png" />
    <meta name="twitter:title" content="HufManager — Software für Hufbearbeiter" />
    <meta name="twitter:description" content="Kunden, Pferde, Termine, Rechnungen und Touren — alles in einer App." />


    <!-- DNS Prefetch & Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://vnschgjxkzzwzefqlrji.supabase.co" />
    <link rel="preconnect" href="https://vnschgjxkzzwzefqlrji.supabase.co" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;600;700&family=Lora:wght@400;600;700&family=Merriweather:wght@400;700&family=Open+Sans:wght@400;600;700&family=Playfair+Display:wght@400;600;700&family=Roboto:wght@400;500;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet" />

    <!-- Sentry Error Monitoring (CDN, deferred so React loads first) -->
    <script
      crossorigin="anonymous"
      defer
    ></script>
    <script defer>
      document.addEventListener('DOMContentLoaded', function() {
        window.Sentry && Sentry.init({
          environment: window.location.hostname === "app.hufmanager.de" ? "production" : "development",
          tracesSampleRate: 0.1,
          release: "hufi@2.5.0"
        });
      });
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
