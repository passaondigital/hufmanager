name: Build and push collage worker image

on:
  push:
    paths:
      - 'scripts/**'
      - '.github/workflows/build-push-collage-image.yml'
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./scripts
          file: ./scripts/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/hufmanager-collage-worker:latest
